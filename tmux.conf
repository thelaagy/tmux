




set-option -g default-shell /bin/zsh

set -as terminal-features ",xterm-256color:RGB:clipboard:Tc"
set -g default-terminal "tmux-256color"

set -g allow-passthrough on


set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jabirali/tmux-tilish'

set -g @tilish-easymode 'on'
#set -g @plugin 'brendandebeasi/tabby'

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'


# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# statusbar

set -g @primary_color "#420420"
#set -g @primary_color "#0000AA"
set -g @primary_text_color "white"

set -g @secundary_color "#B00B69"
set -g @secundary_text_color "#000000"

set -g @selected-color "#420420"
set -g @selected-text-color "#B00B69"


set -g status-position top
set -g status-justify centre
set -g status-style 'bg=#{@secundary_color} fg=#{@secundary_text_color}'

set -g status-left-style 'bg=#{@primary_color} fg=#{@primary_text_color}'
set -g status-left ' #H [#I] #[bg=#{@secundary_colo}] '
set -g status-left-length 32

set -g status-right-style 'bg=#{@primary_color} fg=#{@primary_text_color}'
set -g status-right '[ %a %d %b %Y  %H:%M ]'
set -g status-right-length 32

setw -g window-status-current-style 'bg=#{@selected-color} fg=#{@selected-text-color}'
setw -g window-status-current-format '[ (#F) #W   ]'
setw -g window-status-format         '[ (#I) #W   ]'

setw -g window-status-bell-style 'fg=yellow bg=red bold'


run '/usr/share/tmux-plugin-manager/tpm'

